<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grafik Perkembangan Data Stunting Desa</title>
    <link rel="stylesheet" href="style.css">
    <!-- Menggunakan Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="demographic-container">
        <!-- HEADER (Mengikuti style Data Demografis) -->
        <div class="demo-title">Grafik Perkembangan Data Stunting Desa</div>
        
        <p class="demo-subtitle">Visualisasi data prevalensi stunting dari tahun ke tahun untuk pemantauan kesehatan anak.</p>

        <!-- AREA GRAFIK -->
        <div class="chart-container">
            <canvas id="stuntingChart"></canvas>
        </div>

        <!-- INFORMASI TAMBAHAN / FOOTER -->
        <div class="footer">
            <p>Arahkan kursor (hover) atau ketuk batang grafik pada HP untuk melihat detail angka persentase.</p>
            <p class="source">Sumber: Posyandu & Layanan Kesehatan Desa</p>
        </div>
    </div>

    <!-- Hubungkan ke file JS eksternal -->
    <script src="data.js"></script>
</body>
</html>
